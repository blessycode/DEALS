name: Keep Streamlit Awake

on:
  schedule:
    # Runs daily at 05:30 UTC, which is 07:30 in Africa/Harare.
    - cron: "30 5 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ vars.STREAMLIT_APP_URL }}

    steps:
      - name: Check app URL is configured
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Set a repository variable named STREAMLIT_APP_URL to your Streamlit app URL."
            echo "Example: https://your-app-name.streamlit.app"
            exit 1
          fi

      - name: Wake Streamlit app
        run: |
          curl \
            --location \
            --fail \
            --silent \
            --show-error \
            --max-time 120 \
            --retry 6 \
            --retry-delay 20 \
            --retry-all-errors \
            "$APP_URL"
